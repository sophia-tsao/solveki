name: E2E tests

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/e2e-tests.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/e2e-tests.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: pip install .

      - name: Migrate and seed
        working-directory: backend
        run: |
          python manage.py migrate
          # seed_topics must run first: it creates the Topic rows, and
          # seed_courses then links those existing topics to their courses.
          python manage.py seed_topics
          python manage.py seed_courses

      - name: Start backend
        working-directory: backend
        env:
          # Enables the test-only login endpoint the E2E suite relies on.
          ENABLE_TEST_LOGIN: "1"
        run: |
          python manage.py runserver 8000 --noreload &
          # Wait until the server answers before handing off to Playwright.
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/auth/me/ >/dev/null && break
            sleep 1
          done

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        env:
          E2E_API_URL: http://localhost:8000
          E2E_BASE_URL: http://localhost:5173
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
